<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гача Герои</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,sans-serif;
    background:#050505;
    color:white;
    overflow-x:hidden;
}

canvas{
    position:fixed;
    inset:0;
    z-index:-1;
}

header{
    text-align:center;
    padding:60px 20px;
}

h1{
    font-size:4rem;
    text-shadow:0 0 15px #00ffff,
                 0 0 30px #ff00ff;
    cursor:pointer;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{transform:scale(1.05)}
}

.search{
    margin:30px auto;
    max-width:500px;
}

.search input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:18px;
}

.grid{
    width:95%;
    max-width:1400px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    padding-bottom:80px;
}

.card{
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:.4s;
    transform-style:preserve-3d;
}

.card:hover{
    transform:translateY(-10px) rotateX(5deg);
    box-shadow:0 0 30px #00ffff;
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card h2{
    margin-bottom:8px;
}

.nick{
    color:gold;
    margin-bottom:12px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.modal-box{
    max-width:700px;
    width:100%;
    background:#111;
    border-radius:20px;
    overflow:hidden;
    animation:show .4s;
}

.modal-box img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.modal-content{
    padding:25px;
}

.close{
    float:right;
    font-size:30px;
    cursor:pointer;
}

@keyframes show{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.party{
    animation:party 1s infinite linear;
}

@keyframes party{
    from{filter:hue-rotate(0deg)}
    to{filter:hue-rotate(360deg)}
}

footer{
    text-align:center;
    padding:30px;
    color:#888;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<header>
    <h1 id="logo">💪 ГАЧА ГЕРОИ 💪</h1>

    <div class="search">
        <input id="search" placeholder="Поиск героя...">
    </div>
</header>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
    <div class="modal-box">
        <img id="mImg">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">✖</span>
            <h2 id="mName"></h2>
            <p id="mNick"></p>
            <br>
            <p id="mDesc"></p>
        </div>
    </div>
</div>

<footer>
Нажми на логотип 5 раз для секретного режима 🌈
</footer>

<script>

/* ======== ПЕРСОНАЖИ ======== */

const heroes = [

{
name:"Billie Herrington",
nick:"Aniki, Big Brother, Boss of Gym",
img:"https://images.steamusercontent.com/ugc/1825640520358218214/61165E8755950FBDFBD37A22982000C5D1D8B138/",
desc:"Легендарная фигура Gachi-культуры и один из самых известных персонажей сообщества. Благодаря харизме, чувству юмора и запоминающимся моментам стал настоящим символом жанра. Многие фанаты считают его главным героем всей истории Gachi."
},

{
name:"Van Darkholme",
nick:"Dungeon Master, Van",
img:"https://images.steamusercontent.com/ugc/1825640520358283353/153B90378F665B32011489C9B5E65C62ECE4D741/",
desc:"Один из самых узнаваемых участников сообщества. Прославился своими мемами, цитатами и выступлениями. После популярности в интернете активно общался с фанатами и участвовал в различных онлайн-проектах."
},

{
name:"Mark Wolf",
nick:"Boy Next Door",
img:"https://images.steamusercontent.com/ugc/1825640520358304905/3241309CC5EF0787E542CE60107925BF50D71C67/",
desc:"Один из самых известных мемных персонажей. Запомнился зрителям своим уверенным характером и множеством культовых фраз, которые позже стали интернет-мемами."
},

{
name:"Danny Lee",
nick:"Kazya",
img:"https://images.steamusercontent.com/ugc/1825640520358317562/952E0C2DEB6B4FC996E16105139C52775A145492/",
desc:"Сильный и харизматичный участник старой школы Gachi. Среди фанатов известен как один из самых запоминающихся персонажей своего поколения."
},

{
name:"Steve Rambo",
nick:"Sheriff",
img:"https://images.steamusercontent.com/ugc/1825640520358218853/66F9954210839EFD52F4AA98EB62955C7C90D1C0/",
desc:"Персонаж, вокруг которого появилось множество мемов и шуток. Часто фигурирует в фанатских историях и считается важной частью Gachi-вселенной."
},

{
name:"Brad McGuire",
nick:"Rip The Skin",
img:"https://images.steamusercontent.com/ugc/1825640520358359219/DEB5640AC80579D6ECEB880F53A0171AB3635AA0/",
desc:"Яркий герой сообщества, который запомнился зрителям своей необычной внешностью и энергичным характером."
},

{
name:"Rey Harley",
nick:"Дядя Богдан",
img:"https://images.steamusercontent.com/ugc/1842538361142659949/9DD24D3678E037170171F0BBFD81042513A70779/",
desc:"Один из любимых персонажей русскоязычного сообщества. Благодаря мемам и фанатскому творчеству стал культовой фигурой среди поклонников Gachi."
},

{
name:"Steve Hurley",
nick:"Titpig, Pig",
img:"https://images.steamusercontent.com/ugc/1825640520358386354/49207ECCC3E30935D0B340B2856366F85DAC372D/",
desc:"Крупный и очень узнаваемый персонаж. Часто появляется в мемах и фанатских видео благодаря своему необычному образу."
},

{
name:"Ricardo Milos",
nick:"Легенда танца",
img:"https://images.steamusercontent.com/ugc/1825640520358328256/E4B60DAAC4A520878654A8B8BE6BCED051CB841C/",
desc:"Один из самых известных интернет-мемов в мире. Его танец стал вирусным и сделал Рикардо узнаваемым далеко за пределами Gachi-сообщества."
},

];

/* ======== РЕНДЕР ======== */

const grid=document.getElementById("grid");

function render(list){

grid.innerHTML="";

list.forEach(hero=>{

grid.innerHTML+=`
<div class="card"
onclick='openModal(${JSON.stringify(hero)})'>

<img src="${hero.img}">

<div class="card-content">
<h2>${hero.name}</h2>
<div class="nick">${hero.nick}</div>
<p>${hero.desc}</p>
</div>

</div>
`;

});
}

render(heroes);

/* ======== ПОИСК ======== */

search.addEventListener("input",e=>{

const q=e.target.value.toLowerCase();

render(
heroes.filter(h=>
h.name.toLowerCase().includes(q) ||
h.nick.toLowerCase().includes(q)
)
);

});

/* ======== МОДАЛКА ======== */

function openModal(hero){

modal.style.display="flex";

mImg.src=hero.img;
mName.textContent=hero.name;
mNick.textContent=hero.nick;
mDesc.textContent=hero.desc;

}

function closeModal(){
modal.style.display="none";
}

modal.onclick=e=>{
if(e.target===modal) closeModal();
}

/* ======== СЕКРЕТ ======== */

let clicks=0;

logo.onclick=()=>{

clicks++;

if(clicks>=5){

document.body.classList.toggle("party");

alert("🌈 SECRET MODE ACTIVATED 🌈");

clicks=0;
}

}

/* ======== CANVAS ======== */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}

resize();
addEventListener("resize",resize);

const particles=[];

for(let i=0;i<120;i++){

particles.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
r:Math.random()*3+1,
s:Math.random()*1+0.3
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(0,255,255,.5)";
ctx.fill();

p.y-=p.s;

if(p.y<0){
p.y=innerHeight;
p.x=Math.random()*innerWidth;
}

});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
